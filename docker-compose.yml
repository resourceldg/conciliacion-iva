services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-conciliacion}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  api:
    build:
      context: ./Algoritmo_conciliatorio_mensual
      dockerfile: services/api/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-conciliacion}}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:4173}
      APP_NAME: ${APP_NAME:-Conciliador API}
    depends_on:
      - db
    ports:
      - "8000:8000"

  frontend:
    build: ./Algoritmo_conciliatorio_mensual/apps/frontend
    environment:
      PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:-http://api:8000}
    depends_on:
      - api
    ports:
      - "4173:4173"

volumes:
  db_data:


    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-conciliacion}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  api:
    build:
      context: ./Algoritmo_conciliatorio_mensual
      dockerfile: services/api/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-conciliacion}}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:4173}
      APP_NAME: ${APP_NAME:-Conciliador API}
    depends_on:
      - db
    ports:
      - "8000:8000"

  frontend:
    build: ./Algoritmo_conciliatorio_mensual/apps/frontend
    environment:
      PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:-http://api:8000}
    depends_on:
      - api
    ports:
      - "4173:4173"

volumes:
  db_data:
